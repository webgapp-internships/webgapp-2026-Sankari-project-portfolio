<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>styles</title>
    <style>
        .img1 {
            position:relative;
            left:30px;
            width:2px;
            height:2px;
            size:30cm;
        }
        .img2 {
            position:absolute;
            left: 700px;
            width:2px;
            height:2px;
            size:30cm;
        }
        .img3 {
            position:absolute;
            left: 1350px;
            width:2px;
            height:2px;
            size:30cm;
        }
        .text1 {
            position:absolute;
            left: 800px;
            top:1000px
            width:2px;
            height:2px;
            size:30cm;
        }
        .img4 {
            position:fixed;
            left: 100px;
            bottom:1000px
            width:2px;
            height:2px;
            size:30cm;
        }

    </style>
    </head>
    <body>
        <h1>styles pages</h1>
        <div class="img1">
             <img src="1 (5).png">
        </div>
        <div class="img2">
             <img src="1 (4).png">
        </div>

       <div class="img3">
             <img src="1 (3).png">
        </div>

       <div class="text1">
             <h3>HI, HELLO!</h3>
        </div>
        <div class="img4">
             <img src="1 (2).png">
        </div>


    </body>
</html>
