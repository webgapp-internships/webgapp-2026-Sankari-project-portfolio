<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Dashboard</title>

<style>

*{
    margin:10;
    padding:10;
    
    font-family:Arial, sans-serif;
}

body{
    background:#aee0e7;
    padding:30px;
}


h1{
    text-align:center;
    color:#1f2937;
}


.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:20px;
}

.card{
    padding:25px;
    color:white;
    border-radius:15px;
}

.blue{
    background:blue;
}

.green{
    background:greenyellow;
}

.red{
    background:red;
}

.orange{
    background:orange;
}


.large-cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    margin-bottom:20px;
}

.large-card{
    padding:25px;
    color:white;
    border-radius:15px;
}

.purple{
    background:purple;
}

.dark{
    background:rgb(211, 51, 152);
}


.bottom-section{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.box{
    
    min-width:600px;
    background:white;
    padding:20px;
    border-radius:15px;
    
}

.box h2{
    margin-bottom:15px;
}

.box p{
    padding:10px 20px;
    


</style>
</head>

<body>

<h1>CSS STYLES</h1>


<div class="cards">

    <div class="card blue">
        <h3>Total Employees</h3>
        <h1>20</h1>
    </div>

    <div class="card green">
        <h3>Present Today</h3>
        <h1>18</h1>
    </div>

    <div class="card red">
        <h3>Absent Today</h3>
        <h1>2</h1>
    </div>

    <div class="card orange">
        <h3>Active Projects</h3>
        <h1>5</h1>
    </div>

</div>


<div class="large-cards">

    <div class="large-card purple">
        <h3> Completed projects</h3>
        <h1>12</h1>
    </div>

    <div class="large-card dark">
        <h3>Tasks Due Today</h3>
        <h1>34</h1>
    </div>

</div>


<div class="bottom-section">

    <div class="box">
        <h2>Peoples present</h2>

        <p>Priya</p>
        <p>Ram</p>
        <p>Ramesh </p>
        <p>Arun</p>
    </div>

    <div class="box">
        <h2>Absentees</h2>

        <p>John </p>
        <p>Preethi</p>
        <p>-</p>
        <p>-</p>
    </div>

</div>

</body>
</html>
