<!DOCTYPE html>
<html>
<head>
  <title>Contact Form</title>
  <style>
    body {
      background-image:url("image.png");
      background-size: fill;
      font-family: Arial;
      padding: 20px;
      min-height: 100vh;
      text-align: center;
    }

    .top {
      background-color: #2e7d32;
      height: 100px;
      width: 600px;
      border-radius: 10px 10px 0 0;
      margin: 0 auto;
    }

    .form-box {
      background-color: white;
      width: 600px;
      padding: 20px;
      border-top: 6px solid #2e7d32;
      margin: 0 auto 15px auto;
      text-align: left;
    }

    .question {
      background-color: white;
      width: 600px;
      padding: 20px;
      margin: 0 auto 15px auto;
      border: 1px solid #ccc;
      text-align: left;
    }

    h1 {
      font-size: 26px;
    }

    p {
      color: gray;
      font-size: 14px;
    }

    label {
      font-size: 15px;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      border: none;
      border-bottom: 1px solid gray;
      padding: 5px;
      font-size: 14px;
      margin-top: 10px;
      outline: none;
    }

    textarea {
      width: 100%;
      height: 60px;
      border: 1px solid gray;
      padding: 5px;
      margin-top: 10px;
      font-size: 14px;
    }

    select {
      margin-top: 10px;
      padding: 5px;
      font-size: 14px;
      width: 100%;
    }

    .red {
      color: red;
    }

    button {
      background-color: #1a73e8;
      color: white;
      padding: 10px 25px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 10px;
    }


    body{
      
    }
  </style>
</head>
<body align="centre">

  <div class="top"></div>

  <div class="form-box">
    <h1>Contact Information</h1>
    <p>Please fill out the form below.</p>
    <p class="red">* Required</p>
  </div>

  <div class="question">
    <label>Name <span class="red">*</span></label><br>
    <input type="text" placeholder="Your answer">
  </div>

  <div class="question">
    <label>Email <span class="red">*</span></label><br>
    <input type="email" placeholder="Your answer">
  </div>

  <div class="question">
    <label>Address <span class="red">*</span></label><br>
    <textarea placeholder="Your answer"></textarea>
  </div>

  <div class="question">
    <label>Gender <span class="red">*</span></label><br><br>
    <input type="radio" name="gender" id="male">
    <label for="male">Male</label><br><br>
    <input type="radio" name="gender" id="female">
    <label for="female">Female</label><br><br>
    <input type="radio" name="gender" id="other">
    <label for="other">Other</label>
  </div>

  <div class="question">
    <label>Course <span class="red">*</span></label><br>
    <select>
      <option>-- Select --</option>
      <option>Web Development</option>
      <option>Python</option>
      <option>UI/UX Design</option>
      <option>Data Science</option>
    </select>
  </div>

  <div class="question">
    <label>Hobbies</label><br><br>
    <input type="checkbox" id="coding">
    <label for="coding">Coding</label><br><br>
    <input type="checkbox" id="reading">
    <label for="reading">Reading</label><br><br>
    <input type="checkbox" id="sports">
    <label for="sports">Sports</label>
  </div>

  <div class="question">
    <button type="button">Submit</button>
  </div>

</body>
</html>
